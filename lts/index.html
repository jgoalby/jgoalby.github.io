<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Background</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #24495e;
    }

    body {
      overflow: hidden;
      position: relative;
    }

    .layer {
      position: absolute;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .layer--fx {
      pointer-events: none;
    }
  </style>

  <svg xmlns="http://www.w3.org/2000/svg" id="shimmer-scene" class="layer layer--fx" viewBox="0 0 2200 1690" preserveAspectRatio="xMidYMid meet" aria-hidden="true">

      </filter>

  <script>
    const logoParts = Object.freeze({
      leftSmall: document.getElementById("logo-left-small"),
      leftMedium: document.getElementById("logo-left-medium"),
      leftLarge: document.getElementById("logo-left-large"),
      rightLarge: document.getElementById("logo-right-large"),
      rightMedium: document.getElementById("logo-right-medium"),
      rightSmall: document.getElementById("logo-right-small"),
      head: document.getElementById("logo-head")
    });

    const defaultColor = "#b8d6e3";
    const defaultOpacity = 0.115;
    const shimmerGroup = document.getElementById("logo-shimmer");
    const shimmerBand = document.getElementById("logo-shimmer-band");
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
    const introPartNames = [
      "leftSmall",
      "rightSmall",
      "leftMedium",
      "rightMedium",
      "leftLarge",
      "rightLarge"
    ];
    const introColor = "#d92f2f";
    const partDefaults = Object.freeze(
      Object.fromEntries(
        Object.entries(logoParts).map(([name, element]) => [
          name,
          {
            fill: element.getAttribute("data-base-fill") || element.getAttribute("fill") || defaultColor,
            opacity: element.getAttribute("data-base-opacity") || element.getAttribute("fill-opacity") || String(defaultOpacity)
          }
        ])
      )
    );
    const shimmerState = {
      sweepMs: 2000,
      gapMs: 7000,
      fromX: -1450,
      toX: 1450,
      rafId: 0,
      paused: prefersReducedMotion.matches,
      startedAt: performance.now()
    };
    const introState = {
      intervalMs: 1000,
      timeoutIds: []
    };

    function getPart(partName) {
      return logoParts[partName] || document.getElementById(partName) || null;
    }

    function applyBaseStyle(partName) {
      const part = getPart(partName);
      const defaults = partDefaults[partName];
      if (!part || !defaults) {
        return false;
      }

      part.setAttribute("fill", defaults.fill);
      part.setAttribute("fill-opacity", defaults.opacity);
      return true;
    }

    function clearIntroTimers() {
      introState.timeoutIds.forEach((timeoutId) => window.clearTimeout(timeoutId));
      introState.timeoutIds = [];
    }

    function playIntroSequence() {
      clearIntroTimers();

      introPartNames.forEach((partName) => {
        const part = getPart(partName);
        if (!part) {
          return;
        }

        part.setAttribute("fill", introColor);
        part.setAttribute("fill-opacity", partDefaults[partName].opacity);
      });

      if (prefersReducedMotion.matches) {
        introPartNames.forEach(applyBaseStyle);
        return;
      }

      introPartNames.forEach((partName, index) => {
        const timeoutId = window.setTimeout(() => {
          applyBaseStyle(partName);
        }, (index + 1) * introState.intervalMs);

        introState.timeoutIds.push(timeoutId);
      });
    }

    function setShimmerFrame(timestamp) {
      const cycleMs = shimmerState.sweepMs + shimmerState.gapMs;
      const elapsed = (timestamp - shimmerState.startedAt) % cycleMs;

      if (elapsed <= shimmerState.sweepMs) {
        const progress = elapsed / shimmerState.sweepMs;
        const currentX = shimmerState.fromX + ((shimmerState.toX - shimmerState.fromX) * progress);
        const intensity = Math.sin(progress * Math.PI);

        shimmerGroup.setAttribute("opacity", String(0.12 + (intensity * 0.56)));
        shimmerBand.setAttribute("transform", `translate(${currentX} 0)`);
      } else {
        shimmerGroup.setAttribute("opacity", "0");
      }

      if (!shimmerState.paused) {
        shimmerState.rafId = window.requestAnimationFrame(setShimmerFrame);
      }
    }

    function startShimmer() {
      if (!shimmerState.paused) {
        return;
      }

      shimmerState.paused = false;
      shimmerState.startedAt = performance.now();
      shimmerState.rafId = window.requestAnimationFrame(setShimmerFrame);
    }

    function pauseShimmer() {
      shimmerState.paused = true;
      shimmerGroup.setAttribute("opacity", "0");
      window.cancelAnimationFrame(shimmerState.rafId);
    }

    function triggerShimmer() {
      shimmerState.startedAt = performance.now();
      if (shimmerState.paused) {
        shimmerState.paused = false;
      } else {
        window.cancelAnimationFrame(shimmerState.rafId);
      }

      shimmerState.rafId = window.requestAnimationFrame(setShimmerFrame);
    }

    prefersReducedMotion.addEventListener("change", (event) => {
      if (event.matches) {
        pauseShimmer();
        return;
      }

      shimmerState.startedAt = performance.now();
      if (shimmerState.paused) {
        shimmerState.paused = false;
        shimmerState.rafId = window.requestAnimationFrame(setShimmerFrame);
      }
    });

    window.logoArtwork = Object.freeze({
      element: document.getElementById("logo-mark"),
      elements: logoParts,
      ids: Object.freeze(Object.values(logoParts).map((element) => element.id)),
      setColor(partName, color) {
        const part = getPart(partName);
        if (!part) {
          return false;
        }

        part.setAttribute("fill", color);
        return true;
      },
      setOpacity(partName, opacity) {
        const part = getPart(partName);
        if (!part) {
          return false;
        }

        part.setAttribute("fill-opacity", String(opacity));
        return true;
      },
      setAllColors(color) {
        Object.values(logoParts).forEach((part) => {
          part.setAttribute("fill", color);
        });
      },
      setAllOpacities(opacity) {
        Object.values(logoParts).forEach((part) => {
          part.setAttribute("fill-opacity", String(opacity));
        });
      },
      reset() {
        Object.values(logoParts).forEach((part) => {
          const partName = Object.keys(logoParts).find((name) => logoParts[name] === part);
          if (partName) {
            applyBaseStyle(partName);
          }
        });
      },
      playIntro() {
        playIntroSequence();
      }
    });

    window.logoShimmer = Object.freeze({
      play: startShimmer,
      pause: pauseShimmer,
      trigger: triggerShimmer,
      setTiming({ sweepMs, gapMs } = {}) {
        if (Number.isFinite(sweepMs) && sweepMs > 0) {
          shimmerState.sweepMs = sweepMs;
        }

        if (Number.isFinite(gapMs) && gapMs >= 0) {
          shimmerState.gapMs = gapMs;
        }

        shimmerState.startedAt = performance.now();
      }
    });

    if (!shimmerState.paused) {
      shimmerState.rafId = window.requestAnimationFrame(setShimmerFrame);
    }

    playIntroSequence();
  </script>
