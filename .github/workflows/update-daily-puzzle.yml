name: Update Daily Puzzle

on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-daily-puzzle:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Set Up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh daily.json
        run: node scripts/update-daily.mjs

      - name: Commit Updated Puzzle
        run: |
          if git diff --quiet -- daily.json; then
            echo "daily.json is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily.json
          git commit -m "Update daily puzzle for $(date -u +%F)"
          git push
